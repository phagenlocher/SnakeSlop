<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Snake</title>
    <link rel="stylesheet" href="snake.css" />
  </head>
  <body>
    <div class="snake-root">
      <div class="snake-game-container"></div>
      <div class="snake-mode-selector">
        <label
          >Mode:
          <select class="snake-mode-select">
            <option value="classic">Classic</option>
            <option value="timeTrial">Time Trial</option>
            <option value="constrictor">Constrictor</option>
          </select>
        </label>
      </div>
      <hr />
      <details class="snake-features-details">
        <summary>Game Features</summary>
        <div class="snake-toggles">
          <div class="snake-toggle-group">
            <p class="snake-toggle-heading">Bonuses and Score</p>
            <div class="snake-toggle-grid">
              <label title="Golden diamond worth 100pts, appears every 15s and moves randomly"
                ><input type="checkbox" class="snake-toggle-bonus-food" checked /> Bonus Food</label
              >
              <label title="Bonus food spawns every 15 seconds instead of every 5 foods eaten"
                ><input type="checkbox" class="snake-toggle-timed-bonus" checked /> Timed Bonus Food</label
              >
              <label
                class="snake-toggle-shrink-label"
                title="Snake shrinks by half when eating bonus food (minimum 15 in Constrictor mode)"
                ><input type="checkbox" class="snake-toggle-shrink" checked /> Shrink on Bonus Food</label
              >
              <label title="Decaying bonus multiplier added to score when eating food"
                ><input type="checkbox" class="snake-toggle-score-bonus" checked /> Score Bonus</label
              >
            </div>
          </div>
          <div class="snake-toggle-group">
            <p class="snake-toggle-heading">Movement and Speed</p>
            <div class="snake-toggle-grid">
              <label title="1-second warning before game over, lets you dodge with a safe arrow key"
                ><input type="checkbox" class="snake-toggle-grace-period" checked /> Grace Period</label
              >
              <label title="Snake teleports to opposite edge instead of dying at walls"
                ><input type="checkbox" class="snake-toggle-wrap" checked /> Wrap Around</label
              >
              <label title="Game accelerates as you eat food, from 135ms down to 50ms"
                ><input type="checkbox" class="snake-toggle-speed-up" checked /> Speed Up</label
              >
              <label title="Press the same direction key to temporarily move ~35% faster"
                ><input type="checkbox" class="snake-toggle-speed-boost" checked /> Speed Boost</label
              >
            </div>
          </div>
          <div class="snake-toggle-group">
            <p class="snake-toggle-heading">Input Handling</p>
            <div class="snake-toggle-grid">
              <label title="Queues rapid direction inputs so they aren't lost between ticks"
                ><input type="checkbox" class="snake-toggle-input-buffer" checked /> Input Buffer</label
              >
              <label
                title="Snake moves immediately when a key is pressed, instead of waiting for the next tick. Opposite-direction presses are ignored."
                ><input type="checkbox" class="snake-toggle-instant-movement" checked /> Instant Movement</label
              >
            </div>
          </div>
          <div class="snake-toggle-group">
            <p class="snake-toggle-heading">Level Design</p>
            <div class="snake-toggle-grid">
              <label title="Static walls form a hollow square with openings in the center of each side"
                ><input type="checkbox" class="snake-toggle-walls" checked /> Static Walls</label
              >
              <label
                title="Black/white wormhole pair spawns every 30s and lasts 15s. Enter the black cell to teleport to the white cell. Won't spawn when board is nearly full."
                ><input type="checkbox" class="snake-toggle-wormholes" checked /> Worm Holes</label
              >
            </div>
          </div>
        </div>
      </details>
    </div>

    <script src="snake.js"></script>
    <script>
      const STORAGE_KEY = 'snake-game-settings';

      const gameContainer = document.querySelector('.snake-game-container');
      const modeSelect = document.querySelector('.snake-mode-select');
      const toggleBonusFood = document.querySelector('.snake-toggle-bonus-food');
      const toggleGracePeriod = document.querySelector('.snake-toggle-grace-period');
      const toggleShrink = document.querySelector('.snake-toggle-shrink');
      const toggleSpeedUp = document.querySelector('.snake-toggle-speed-up');
      const toggleScoreBonus = document.querySelector('.snake-toggle-score-bonus');
      const toggleWrap = document.querySelector('.snake-toggle-wrap');
      const toggleSpeedBoost = document.querySelector('.snake-toggle-speed-boost');
      const toggleInputBuffer = document.querySelector('.snake-toggle-input-buffer');
      const toggleTimedBonus = document.querySelector('.snake-toggle-timed-bonus');
      const toggleWalls = document.querySelector('.snake-toggle-walls');
      const toggleInstantMovement = document.querySelector('.snake-toggle-instant-movement');
      const toggleWormholes = document.querySelector('.snake-toggle-wormholes');

      let game = null;

      function saveSettings() {
        const settings = {
          mode: modeSelect.value,
          enableBonusFood: toggleBonusFood.checked,
          enableGracePeriod: toggleGracePeriod.checked,
          enableShrinkOnBonusFood: toggleShrink.checked,
          enableSpeedUp: toggleSpeedUp.checked,
          enableScoreBonus: toggleScoreBonus.checked,
          enableWrap: toggleWrap.checked,
          enableSpeedBoost: toggleSpeedBoost.checked,
          enableInputBuffer: toggleInputBuffer.checked,
          enableInstantMovement: toggleInstantMovement.checked,
          enableTimedBonusFood: toggleTimedBonus.checked,
          enableWalls: toggleWalls.checked,
          enableWormholes: toggleWormholes.checked,
        };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(settings));
      }

      function loadSettings() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return;
          const s = JSON.parse(raw);
          if (s.mode) modeSelect.value = s.mode;
          if (typeof s.enableBonusFood === 'boolean') toggleBonusFood.checked = s.enableBonusFood;
          if (typeof s.enableGracePeriod === 'boolean') toggleGracePeriod.checked = s.enableGracePeriod;
          if (typeof s.enableShrinkOnBonusFood === 'boolean') toggleShrink.checked = s.enableShrinkOnBonusFood;
          if (typeof s.enableSpeedUp === 'boolean') toggleSpeedUp.checked = s.enableSpeedUp;
          if (typeof s.enableScoreBonus === 'boolean') toggleScoreBonus.checked = s.enableScoreBonus;
          if (typeof s.enableWrap === 'boolean') toggleWrap.checked = s.enableWrap;
          if (typeof s.enableSpeedBoost === 'boolean') toggleSpeedBoost.checked = s.enableSpeedBoost;
          if (typeof s.enableInputBuffer === 'boolean') toggleInputBuffer.checked = s.enableInputBuffer;
          if (typeof s.enableInstantMovement === 'boolean') toggleInstantMovement.checked = s.enableInstantMovement;
          if (typeof s.enableTimedBonusFood === 'boolean') toggleTimedBonus.checked = s.enableTimedBonusFood;
          if (typeof s.enableWalls === 'boolean') toggleWalls.checked = s.enableWalls;
          if (typeof s.enableWormholes === 'boolean') toggleWormholes.checked = s.enableWormholes;
        } catch (_) {
          // corrupted or missing → use HTML defaults
        }
      }

      function mountGame() {
        if (game) {
          game.destroy();
        }
        game = new SnakeGame(gameContainer, {
          mode: modeSelect.value,
          enableBonusFood: toggleBonusFood.checked,
          enableGracePeriod: toggleGracePeriod.checked,
          enableShrinkOnBonusFood: toggleShrink.checked,
          enableSpeedUp: toggleSpeedUp.checked,
          enableScoreBonus: toggleScoreBonus.checked,
          enableWrap: toggleWrap.checked,
          enableSpeedBoost: toggleSpeedBoost.checked,
          enableInputBuffer: toggleInputBuffer.checked,
          enableInstantMovement: toggleInstantMovement.checked,
          enableTimedBonusFood: toggleTimedBonus.checked,
          enableWalls: toggleWalls.checked,
          enableWormholes: toggleWormholes.checked,
        });
        saveSettings();
      }

      modeSelect.addEventListener('change', mountGame);
      toggleBonusFood.addEventListener('change', mountGame);
      toggleGracePeriod.addEventListener('change', mountGame);
      toggleShrink.addEventListener('change', mountGame);
      toggleSpeedUp.addEventListener('change', mountGame);
      toggleScoreBonus.addEventListener('change', mountGame);
      toggleWrap.addEventListener('change', mountGame);
      toggleSpeedBoost.addEventListener('change', mountGame);
      toggleInputBuffer.addEventListener('change', mountGame);
      toggleInstantMovement.addEventListener('change', mountGame);
      toggleTimedBonus.addEventListener('change', mountGame);
      toggleWalls.addEventListener('change', mountGame);
      toggleWormholes.addEventListener('change', mountGame);

      loadSettings();
      mountGame();
    </script>
  </body>
</html>
